<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>康軒國語五上線上字典與聽寫測驗系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #f8fafc;
    }
    .zhuyin-text {
      font-size: 0.85em;
      color: #0284c7;
      margin-left: 2px;
    }
    @media print {
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      body { background-color: white; }
    }
    .print-only { display: none; }
  </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

  <!-- Header Section -->
  <header class="bg-indigo-700 text-white shadow-lg no-print">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center space-x-3">
        <div class="bg-amber-400 text-indigo-900 font-bold p-2.5 rounded-xl shadow text-xl">
          <i class="fa-solid me-1 fa-book-bookmark"></i> 5上
        </div>
        <div>
          <h1 class="text-2xl font-bold tracking-wide">康軒國語五上 線上字典與聽寫測驗系統</h1>
          <p class="text-indigo-200 text-xs mt-0.5">完整收錄第 1~12 課生字、部首、圈詞解釋、短語練習與聽寫測驗</p>
        </div>
      </div>
      
      <!-- Quick Action Buttons -->
      <div class="flex items-center gap-2">
        <button onclick="exportData()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xs font-medium border border-indigo-400 transition">
          <i class="fa-solid fa-download mr-1"></i> 備份資料
        </button>
        <button onclick="triggerImport()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xs font-medium border border-indigo-400 transition">
          <i class="fa-solid fa-upload mr-1"></i> 匯入備份
        </button>
        <input type="file" id="importFileInput" onchange="importData(event)" class="hidden" accept=".json">
        <button onclick="resetToDefaultData()" class="px-3 py-1.5 bg-rose-600 hover:bg-rose-500 rounded-lg text-xs font-medium transition">
          <i class="fa-solid fa-rotate-left mr-1"></i> 重置課文
        </button>
      </div>
    </div>
  </header>

  <!-- Navigation Tabs -->
  <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-20 no-print">
    <div class="max-w-7xl mx-auto px-4 flex space-x-2 md:space-x-6 overflow-x-auto">
      <button onclick="switchTab('dict')" id="tab-dict" class="py-3 px-3 text-sm font-semibold border-b-2 border-indigo-600 text-indigo-600 flex items-center gap-2 whitespace-nowrap">
        <i class="fa-solid fa-book-open"></i> 生字字典與課文
      </button>
      <button onclick="switchTab('quiz')" id="tab-quiz" class="py-3 px-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-indigo-600 flex items-center gap-2 whitespace-nowrap">
        <i class="fa-solid fa-pen-ruler"></i> 聽寫測驗簿
      </button>
      <button onclick="switchTab('phrases')" id="tab-phrases" class="py-3 px-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-indigo-600 flex items-center gap-2 whitespace-nowrap">
        <i class="fa-solid fa-quote-left"></i> 短語與句型練習
      </button>
      <button onclick="switchTab('manage')" id="tab-manage" class="py-3 px-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-indigo-600 flex items-center gap-2 whitespace-nowrap">
        <i class="fa-solid fa-folder-plus"></i> 新增/編輯字詞
      </button>
    </div>
  </nav>

  <!-- Main Container -->
  <main class="max-w-7xl mx-auto px-4 py-6 flex-grow w-full">

    <!-- 🔍 Search & Filter Bar (Shared across views) -->
    <div id="searchSection" class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-6 no-print">
      <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
        <!-- Lesson Selector -->
        <div class="md:col-span-4 flex items-center gap-2">
          <label for="lessonSelect" class="text-sm font-bold text-slate-700 whitespace-nowrap">選擇課次：</label>
          <select id="lessonSelect" onchange="onLessonChange()" class="w-full bg-slate-50 border border-slate-300 text-slate-800 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            <option value="all">📚 全部位課次 (1-12課)</option>
            <!-- Dynamically filled -->
          </select>
        </div>

        <!-- Keyword Search Input -->
       <!-- 字典查詢嵌入結果 -->
    <div id="dict-popup" class="dictionary-popup hidden no-print">
      <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:4px; color:#3730a3;">
        <span>🔍 教育部字詞釋義：</span>
        <button onclick="document.getElementById('dict-popup').classList.add('hidden')" style="color:#999; font-size:10px; border:none; background:none; cursor:pointer;">[關閉]</button>
      </div>
      <div id="dict-content" style="max-height: 120px; overflow-y:auto; line-height:1.5;"></div>
    </div>


        <!-- TTS Voice Rate Controller -->
        <div class="md:col-span-2 flex items-center justify-end gap-2 text-xs text-slate-500">
          <i class="fa-solid fa-volume-high text-indigo-600"></i>
          <span>語速：</span>
          <select id="voiceRate" class="bg-slate-50 border border-slate-300 rounded px-1.5 py-1">
            <option value="0.7">慢速 0.7x</option>
            <option value="0.9" selected>正常 0.9x</option>
            <option value="1.1">快速 1.1x</option>
          </select>
        </div>
      </div>
    </div>

    <!-- TAB 1: 生字字典與課文 (Dictionary View) -->
    <section id="view-dict" class="space-y-6">
      <div id="dictContentList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Character cards will be rendered here -->
      </div>
    </section>

    <!-- TAB 2: 聽寫測驗簿 (Quiz & Practice View) -->
    <section id="view-quiz" class="hidden space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 no-print">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-100 pb-4">
          <div>
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
              <i class="fa-solid fa-spell-check text-indigo-600"></i> 圈詞聽寫測驗與複習
            </h2>
            <p class="text-sm text-slate-500 mt-1">選定課次後，點擊「播放發音」聽寫生字圈詞，或進行線上自我測驗。</p>
          </div>
          <div class="flex gap-2 flex-wrap">
            <button onclick="toggleHideTerms()" id="toggleHideBtn" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold rounded-xl transition">
              <i class="fa-solid fa-eye-slash mr-1"></i> 遮蔽/顯示答案
            </button>
            <button onclick="playAllQuizAudio()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow transition">
              <i class="fa-solid fa-play mr-1"></i> 自動連續朗讀
            </button>
            <button onclick="window.print()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-xl shadow transition">
              <i class="fa-solid fa-print mr-1"></i> 列印聽寫測驗單
            </button>
          </div>
        </div>

        <div id="quizListContainer" class="mt-6 space-y-4">
          <!-- Quiz list cards generated dynamically -->
        </div>
      </div>
    </section>

    <!-- TAB 3: 短語與句型練習 (Phrases View) -->
    <section id="view-phrases" class="hidden space-y-6">
      <div id="phrasesListContainer" class="space-y-6">
        <!-- Phrase & Sentence patterns will be rendered here -->
      </div>
    </section>

    <!-- TAB 4: 新增/編輯字詞與課文 (Manage View) -->
    <section id="view-manage" class="hidden space-y-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 max-w-3xl mx-auto">
        <h2 class="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
          <i class="fa-solid fa-pen-to-square text-indigo-600"></i> 新增或修改生字與圈詞資料
        </h2>
        <form id="editForm" onsubmit="handleSaveForm(event)" class="space-y-4">
          <input type="hidden" id="editCharId">

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">課次 *</label>
              <select id="editLesson" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-sm" required>
                <!-- Filled dynamically -->
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">生字 *</label>
              <input type="text" id="editChar" maxlength="2" placeholder="例如：墨" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-sm" required>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">注音 *</label>
              <input type="text" id="editZhuyin" placeholder="例如：ㄇㄛˋ" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-sm" required>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">部首 *</label>
              <input type="text" id="editRadical" placeholder="例如：土部 (15畫)" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-sm" required>
            </div>
            <div>
              <label class="block text-xs font-bold text-slate-700 mb-1">單字解釋/字義</label>
              <input type="text" id="editCharMeaning" placeholder="例如：黑色、書寫繪畫的顏料" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-2.5 text-sm">
            </div>
          </div>

          <hr class="my-4 border-slate-200">

          <!-- Terms Section -->
          <div>
            <h3 class="text-sm font-bold text-indigo-700 mb-2">圈詞與解釋 (至少提供兩個圈詞)</h3>
            
            <!-- Term 1 -->
            <div class="p-3 bg-slate-50 rounded-xl border border-slate-200 mb-3 space-y-2">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                <input type="text" id="editTerm1" placeholder="圈詞 1 (例如：墨馬)" class="bg-white border border-slate-300 rounded-lg p-2 text-sm font-bold" required>
                <input type="text" id="editTerm1Zhuyin" placeholder="圈詞 1 注音 (例如：ㄇㄛˋ ㄇㄚˇ)" class="bg-white border border-slate-300 rounded-lg p-2 text-sm">
              </div>
              <input type="text" id="editTerm1Def" placeholder="圈詞 1 解釋" class="w-full bg-white border border-slate-300 rounded-lg p-2 text-sm">
            </div>

            <!-- Term 2 -->
            <div class="p-3 bg-slate-50 rounded-xl border border-slate-200 mb-3 space-y-2">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                <input type="text" id="editTerm2" placeholder="圈詞 2 (例如：潑墨)" class="bg-white border border-slate-300 rounded-lg p-2 text-sm font-bold" required>
                <input type="text" id="editTerm2Zhuyin" placeholder="圈詞 2 注音 (例如：ㄆㄛ¯ ㄇㄛˋ)" class="bg-white border border-slate-300 rounded-lg p-2 text-sm">
              </div>
              <input type="text" id="editTerm2Def" placeholder="圈詞 2 解釋" class="w-full bg-white border border-slate-300 rounded-lg p-2 text-sm">
            </div>
          </div>

          <!-- Image Upload & Canvas Compression -->
          <div class="p-4 bg-indigo-50/50 rounded-xl border border-indigo-100 space-y-3">
            <label class="block text-xs font-bold text-indigo-900">輔助記憶圖片（自動 Canvas 壓縮，防佔空間）</label>
            <input type="file" id="editImageInput" accept="image/*" onchange="handleImageCompress(event)" class="text-xs text-slate-600 block w-full">
            <input type="hidden" id="editImageData">
            <div id="imagePreviewContainer" class="hidden flex items-center gap-3 mt-2">
              <img id="imagePreview" src="" alt="預覽" class="w-20 h-20 object-cover rounded-lg border border-slate-300 shadow-sm">
              <button type="button" onclick="removeImage()" class="text-xs text-rose-600 hover:underline">刪除圖片</button>
            </div>
          </div>

          <div class="flex justify-end gap-3 pt-4">
            <button type="button" onclick="resetForm()" class="px-4 py-2 border border-slate-300 rounded-xl text-slate-600 text-sm hover:bg-slate-100">清空重來</button>
            <button type="submit" class="px-6 py-2 bg-indigo-600 text-white font-bold rounded-xl text-sm shadow hover:bg-indigo-700 transition">儲存資料</button>
          </div>
        </form>
      </div>
    </section>

  </main>

  <!-- Printable Dictation Worksheet Template (Print Only) -->
  <div class="print-only p-8 max-w-4xl mx-auto">
    <div class="text-center border-b-2 border-slate-800 pb-4 mb-6">
      <h1 class="text-2xl font-bold">康軒國語五上 聽寫測驗單</h1>
      <p class="text-sm mt-1">班級：＿＿＿＿＿ 姓名：＿＿＿＿＿ 座號：＿＿＿ 得分：＿＿＿＿＿</p>
    </div>
    <div id="printSheetGrid" class="grid grid-cols-2 gap-6 text-base">
      <!-- Generated dynamically for print -->
    </div>
  </div>

  <!-- Detail Modal -->
  <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4 no-print">
    <div class="bg-white rounded-3xl shadow-2xl max-w-2xl w-full overflow-hidden flex flex-col max-h-[90vh]">
      <div id="modalHeader" class="bg-indigo-700 text-white p-5 flex justify-between items-center">
        <!-- Modal Title -->
      </div>
      <div id="modalBody" class="p-6 overflow-y-auto space-y-4">
        <!-- Modal Content -->
      </div>
      <div class="bg-slate-100 p-4 flex justify-end">
        <button onclick="closeModal()" class="px-5 py-2 bg-slate-700 text-white text-sm font-bold rounded-xl hover:bg-slate-800 transition">關閉窗口</button>
      </div>
    </div>
  </div>

        title: "短語練習：跑道",
        patterns: [
          { pattern: "在（紅色的）（跑道）上（揮灑汗水）", example: "在（廣闊的）（草地上）（快樂奔跑）" }
        ],
        sentence: "「運動員在跑道上全力以赴，展現堅毅的精神。」"
      }
    ];

    // State Variables
    let appData = [];
    let isAnswerHidden = false;
    let currentTab = 'dict';

    // Initialize Application
    window.onload = function() {
      loadData();
      populateLessonDropdowns();
      renderApp();
    };

    // Storage Management
    function loadData() {
      const stored = localStorage.getItem('kanghan_5a_dict_data');
      if (stored) {
        try {
          appData = JSON.parse(stored);
        } catch(e) {
          appData = DEFAULT_DATA;
        }
      } else {
        appData = DEFAULT_DATA;
        saveData();
      }
    }

    function saveData() {
      localStorage.setItem('kanghan_5a_dict_data', JSON.stringify(appData));
    }

    function resetToDefaultData() {
      if (confirm("確定要將所有內容重置為預設預載的 5上 課文內容嗎？自訂新增的生字將會被清除！")) {
        appData = DEFAULT_DATA;
        saveData();
        renderApp();
        alert("已順利恢復預設課文資料！");
      }
    }

    // Populate Lesson Dropdowns
    function populateLessonDropdowns() {
      const select = document.getElementById('lessonSelect');
      const editSelect = document.getElementById('editLesson');
      
      select.innerHTML = '<option value="all">📚 全部位課次 (1-12課)</option>';
      editSelect.innerHTML = '';

      DEFAULT_LESSONS.forEach(l => {
        select.innerHTML += `<option value="${l.id}">${l.title}</option>`;
        editSelect.innerHTML += `<option value="${l.id}">${l.title}</option>`;
      });
    }

    // Tab Switching
    function switchTab(tab) {
      currentTab = tab;
      ['dict', 'quiz', 'phrases', 'manage'].forEach(t => {
        const view = document.getElementById(`view-${t}`);
        const btn = document.getElementById(`tab-${t}`);
        if (t === tab) {
          view.classList.remove('hidden');
          btn.classList.add('border-indigo-600', 'text-indigo-600');
          btn.classList.remove('border-transparent', 'text-slate-500');
        } else {
          view.classList.add('hidden');
          btn.classList.remove('border-indigo-600', 'text-indigo-600');
          btn.classList.add('border-transparent', 'text-slate-500');
        }
      });
      renderApp();
    }

    function onLessonChange() {
      renderApp();
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearSearchBtn').classList.add('hidden');
      renderApp();
    }

    // Filtering Engine
    function getFilteredData() {
      const lessonVal = document.getElementById('lessonSelect').value;
      const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();

      document.getElementById('clearSearchBtn').classList.toggle('hidden', searchVal === '');

      return appData.filter(item => {
        const matchLesson = (lessonVal === 'all') || (item.lessonId.toString() === lessonVal);
        
        if (!searchVal) return matchLesson;

        const matchChar = item.char.includes(searchVal);
        const matchZhuyin = item.zhuyin.includes(searchVal);
        const matchRadical = item.radical.includes(searchVal);
        const matchCharMeaning = item.charMeaning && item.charMeaning.includes(searchVal);
        const matchTerms = item.terms && item.terms.some(t => t.term.includes(searchVal) || (t.def && t.def.includes(searchVal)));

        return matchLesson && (matchChar || matchZhuyin || matchRadical || matchCharMeaning || matchTerms);
      });
    }

    // Render Logic for Active Tab
    function renderApp() {
      const filtered = getFilteredData();

      if (currentTab === 'dict') renderDict(filtered);
      else if (currentTab === 'quiz') renderQuiz(filtered);
      else if (currentTab === 'phrases') renderPhrases();
    }

    // 1. Render Dictionary Cards
    function renderDict(items) {
      const container = document.getElementById('dictContentList');
      if (items.length === 0) {
        container.innerHTML = `
          <div class="col-span-full py-12 text-center text-slate-400">
            <i class="fa-solid fa-folder-open text-5xl mb-3"></i>
            <p class="text-base font-medium">查無符條件的生字資料，可切換課次或自行新增！</p>
          </div>`;
        return;
      }

      container.innerHTML = items.map(item => {
        const lessonInfo = DEFAULT_LESSONS.find(l => l.id === item.lessonId)?.title || `第${item.lessonId}課`;
        return `
          <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hover:shadow-md transition flex flex-col justify-between">
            <div class="p-5">
              <!-- Lesson Tag & Speech -->
              <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-bold text-indigo-700 bg-indigo-50 px-2.5 py-1 rounded-md">
                  ${lessonInfo}
                </span>
                <button onclick="speakText('${item.char}')" title="朗讀" class="w-8 h-8 rounded-full bg-slate-100 hover:bg-indigo-100 text-indigo-600 flex items-center justify-center transition">
                  <i class="fa-solid fa-volume-high text-xs"></i>
                </button>
              </div>

              <!-- Main Character Header -->
              <div class="flex items-center space-x-4 mb-4 border-b border-slate-100 pb-3">
                <div class="w-16 h-16 bg-amber-50 border-2 border-amber-300 rounded-2xl flex items-center justify-center text-3xl font-extrabold text-amber-900 shadow-inner">
                  ${item.char}
                </div>
                <div>
                  <div class="text-lg font-bold text-slate-800 flex items-center">
                    ${item.char} <span class="zhuyin-text text-sm font-normal">［${item.zhuyin}］</span>
                  </div>
                  <div class="text-xs text-slate-500 font-medium mt-0.5">
                    部首：<span class="text-slate-700">${item.radical}</span>
                  </div>
                </div>
              </div>

              <!-- Character Definition -->
              ${item.charMeaning ? `
                <div class="text-xs text-slate-600 mb-3 bg-slate-50 p-2.5 rounded-xl">
                  <strong class="text-slate-800">【字義】</strong> ${item.charMeaning}
                </div>
              ` : ''}

              <!-- Terms List -->
              <div class="space-y-2 mt-2">
                <strong class="text-xs text-indigo-800 block">【精選圈詞與解釋】</strong>
                ${item.terms.map(t => `
                  <div class="p-2.5 rounded-xl bg-indigo-50/40 border border-indigo-100/60">
                    <div class="flex justify-between items-center text-xs font-bold text-slate-800">
                      <span>${t.term} <span class="text-indigo-600 font-normal">(${t.zhuyin})</span></span>
                      <button onclick="speakText('${t.term}')" class="text-slate-400 hover:text-indigo-600">
                        <i class="fa-solid fa-volume-low"></i>
                      </button>
                    </div>
                    ${t.def ? `<p class="text-xs text-slate-600 mt-1">${t.def}</p>` : ''}
                  </div>
                `).join('')}
              </div>

              <!-- Image if available -->
              ${item.image ? `
                <div class="mt-3">
                  <img src="${item.image}" alt="輔助圖片" class="w-full h-32 object-cover rounded-xl border border-slate-200">
                </div>
              ` : ''}
            </div>

            <!-- Card Actions -->
            <div class="bg-slate-50 px-5 py-2.5 border-t border-slate-100 flex justify-between items-center text-xs">
              <button onclick="openDetailModal('${item.id}')" class="text-indigo-600 font-bold hover:underline">
                <i class="fa-solid fa-circle-info mr-1"></i> 完整內容
              </button>
              <div class="space-x-2">
                <button onclick="editCharItem('${item.id}')" class="text-slate-600 hover:text-indigo-600">
                  <i class="fa-solid fa-pen-to-square"></i> 編輯
                </button>
                <button onclick="deleteCharItem('${item.id}')" class="text-rose-600 hover:text-rose-800">
                  <i class="fa-solid fa-trash"></i> 刪除
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // 2. Render Quiz View
    function renderQuiz(items) {
      const container = document.getElementById('quizListContainer');
      const printSheet = document.getElementById('printSheetGrid');
      
      if (items.length === 0) {
        container.innerHTML = `<p class="text-center text-slate-400 py-8">目前無圈詞可進行測驗。</p>`;
        return;
      }

      let allTerms = [];
      items.forEach(item => {
        item.terms.forEach(t => {
          allTerms.push({ ...t, char: item.char, lessonId: item.lessonId });
        });
      });

      // Interactive UI
      container.innerHTML = allTerms.map((t, idx) => `
        <div class="p-4 bg-slate-50 border border-slate-200 rounded-xl flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
          <div class="flex items-center gap-3">
            <span class="w-7 h-7 bg-indigo-100 text-indigo-800 text-xs font-bold rounded-full flex items-center justify-center">
              ${idx + 1}
            </span>
            <div>
              <div class="text-base font-bold text-slate-800 ${isAnswerHidden ? 'filter blur-sm select-none' : ''}">
                ${t.term} <span class="text-xs font-normal text-slate-500">（注音：${t.zhuyin}）</span>
              </div>
              <p class="text-xs text-slate-500 mt-0.5">解釋：${t.def || '無'}</p>
            </div>
          </div>

          <div class="flex items-center gap-2 w-full md:w-auto justify-end">
            <button onclick="speakText('${t.term}')" class="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 shadow transition flex items-center gap-1">
              <i class="fa-solid fa-volume-high"></i> 播放發音
            </button>
          </div>
        </div>
      `).join('');

      // Printable Sheet Render
      printSheet.innerHTML = allTerms.map((t, idx) => `
        <div class="border border-slate-400 p-3 rounded flex flex-col justify-between min-h-[90px]">
          <div class="text-xs text-slate-500">第 ${idx + 1} 題（提示：${t.def || '無'}）</div>
          <div class="text-right text-xs text-slate-400 pt-6">得分：＿＿＿</div>
        </div>
      `).join('');
    }

    // 3. Render Phrase Practice View
    function renderPhrases() {
      const container = document.getElementById('phrasesListContainer');
      const lessonVal = document.getElementById('lessonSelect').value;

      const filteredPhrases = DEFAULT_PHRASES.filter(p => lessonVal === 'all' || p.lessonId.toString() === lessonVal);

      if (filteredPhrases.length === 0) {
        container.innerHTML = `
          <div class="bg-white p-8 rounded-2xl text-center text-slate-400">
            <i class="fa-solid fa-align-left text-4xl mb-2"></i>
            <p class="text-sm">選擇的課次尚無預設短語練習，您可以自己練習仿寫！</p>
          </div>`;
        return;
      }

      container.innerHTML = filteredPhrases.map(p => {
        const lessonInfo = DEFAULT_LESSONS.find(l => l.id === p.lessonId)?.title || `第${p.lessonId}課`;
        return `
          <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div class="text-xs font-bold text-indigo-700 bg-indigo-50 px-2.5 py-1 rounded-md inline-block mb-2">
              ${lessonInfo}
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-4">${p.title}</h3>

            <!-- Patterns -->
            <div class="space-y-3 mb-4">
              <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider">【句型與短語結構】</h4>
              ${p.patterns.map(pat => `
                <div class="p-3 bg-amber-50/60 rounded-xl border border-amber-200/60 text-sm">
                  <div class="font-bold text-amber-900">課本句型：${pat.pattern}</div>
                  <div class="text-xs text-amber-800 mt-1">💡 仿寫參考：${pat.example}</div>
                </div>
              `).join('')}
            </div>

            <!-- Example Sentence -->
            <div class="bg-indigo-50/50 p-3.5 rounded-xl border border-indigo-100 text-xs text-indigo-900">
              <strong>【課文精選句型】</strong> ${p.sentence}
            </div>
          </div>
        `;
      }).join('');
    }

    // TTS Web Speech Synthesis
    function speakText(text) {
      if (!('speechSynthesis' in window)) {
        alert("您的瀏覽器不支援語音朗讀功能！");
        return;
      }
      window.speechSynthesis.cancel(); // Stop current speech
      const rate = parseFloat(document.getElementById('voiceRate').value) || 0.9;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-TW';
      utterance.rate = rate;
      window.speechSynthesis.speak(utterance);
    }

    function playAllQuizAudio() {
      const filtered = getFilteredData();
      let allTerms = [];
      filtered.forEach(item => item.terms.forEach(t => allTerms.push(t.term)));

      if (allTerms.length === 0) return;

      let index = 0;
      function speakNext() {
        if (index >= allTerms.length) return;
        const term = allTerms[index];
        const utterance = new SpeechSynthesisUtterance(term);
        utterance.lang = 'zh-TW';
        utterance.rate = parseFloat(document.getElementById('voiceRate').value) || 0.9;
        utterance.onend = () => {
          index++;
          setTimeout(speakNext, 2000); // Wait 2s between terms for dictation
        };
        window.speechSynthesis.speak(utterance);
      }
      speakNext();
    }

    function toggleHideTerms() {
      isAnswerHidden = !isAnswerHidden;
      document.getElementById('toggleHideBtn').classList.toggle('bg-amber-100', isAnswerHidden);
      renderApp();
    }

    // Canvas Image Compression Handler
    function handleImageCompress(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.src = event.target.result;
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const maxDim = 300; // Resize to max width/height 300px for space efficiency
          let width = img.width;
          let height = img.height;

          if (width > height) {
            if (width > maxDim) {
              height *= maxDim / width;
              width = maxDim;
            }
          } else {
            if (height > maxDim) {
              width *= maxDim / height;
              height = maxDim;
            }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // Compress image to JPEG format with quality 0.6
          const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.6);
          document.getElementById('editImageData').value = compressedDataUrl;
          
          // Preview
          document.getElementById('imagePreview').src = compressedDataUrl;
          document.getElementById('imagePreviewContainer').classList.remove('hidden');
        };
      };
      reader.readAsDataURL(file);
    }

    function removeImage() {
      document.getElementById('editImageData').value = '';
      document.getElementById('editImageInput').value = '';
      document.getElementById('imagePreviewContainer').classList.add('hidden');
    }

    // Form Handle & Save
    function handleSaveForm(e) {
      e.preventDefault();

      const editId = document.getElementById('editCharId').value;
      const lessonId = parseInt(document.getElementById('editLesson').value, 10);
      const char = document.getElementById('editChar').value.trim();
      const zhuyin = document.getElementById('editZhuyin').value.trim();
      const radical = document.getElementById('editRadical').value.trim();
      const charMeaning = document.getElementById('editCharMeaning').value.trim();

      const term1 = document.getElementById('editTerm1').value.trim();
      const term1Zhuyin = document.getElementById('editTerm1Zhuyin').value.trim();
      const term1Def = document.getElementById('editTerm1Def').value.trim();

      const term2 = document.getElementById('editTerm2').value.trim();
      const term2Zhuyin = document.getElementById('editTerm2Zhuyin').value.trim();
      const term2Def = document.getElementById('editTerm2Def').value.trim();

      const image = document.getElementById('editImageData').value;

      const terms = [
        { term: term1, zhuyin: term1Zhuyin, def: term1Def },
        { term: term2, zhuyin: term2Zhuyin, def: term2Def }
      ];

      if (editId) {
        // Edit existing
        const idx = appData.findIndex(item => item.id === editId);
        if (idx !== -1) {
          appData[idx] = { id: editId, lessonId, char, zhuyin, radical, charMeaning, terms, image };
        }
      } else {
        // Add new
        const newObj = {
          id: 'char_' + Date.now(),
          lessonId,
          char,
          zhuyin,
          radical,
          charMeaning,
          terms,
          image
        };
        appData.push(newObj);
      }

      saveData();
      resetForm();
      alert("儲存成功！");
      switchTab('dict');
    }

    function editCharItem(id) {
      const item = appData.find(i => i.id === id);
      if (!item) return;

      switchTab('manage');

      document.getElementById('editCharId').value = item.id;
      document.getElementById('editLesson').value = item.lessonId;
      document.getElementById('editChar').value = item.char;
      document.getElementById('editZhuyin').value = item.zhuyin;
      document.getElementById('editRadical').value = item.radical;
      document.getElementById('editCharMeaning').value = item.charMeaning || '';

      if (item.terms[0]) {
        document.getElementById('editTerm1').value = item.terms[0].term || '';
        document.getElementById('editTerm1Zhuyin').value = item.terms[0].zhuyin || '';
        document.getElementById('editTerm1Def').value = item.terms[0].def || '';
      }

      if (item.terms[1]) {
        document.getElementById('editTerm2').value = item.terms[1].term || '';
        document.getElementById('editTerm2Zhuyin').value = item.terms[1].zhuyin || '';
        document.getElementById('editTerm2Def').value = item.terms[1].def || '';
      }

      if (item.image) {
        document.getElementById('editImageData').value = item.image;
        document.getElementById('imagePreview').src = item.image;
        document.getElementById('imagePreviewContainer').classList.remove('hidden');
      } else {
        removeImage();
      }
    }

    function deleteCharItem(id) {
      if (confirm("確定要刪除這個生字與其對應的圈詞嗎？")) {
        appData = appData.filter(i => i.id !== id);
        saveData();
        renderApp();
      }
    }

    function resetForm() {
      document.getElementById('editForm').reset();
      document.getElementById('editCharId').value = '';
      removeImage();
    }

    // Modal Details View
    function openDetailModal(id) {
      const item = appData.find(i => i.id === id);
      if (!item) return;

      const lessonTitle = DEFAULT_LESSONS.find(l => l.id === item.lessonId)?.title || `第${item.lessonId}課`;

      document.getElementById('modalHeader').innerHTML = `
        <div>
          <span class="text-xs font-bold bg-indigo-600 px-2.5 py-0.5 rounded-full border border-indigo-400">
            ${lessonTitle}
          </span>
          <h2 class="text-2xl font-bold mt-1">${item.char} （${item.zhuyin}）</h2>
        </div>
        <button onclick="speakText('${item.char}')" class="w-10 h-10 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full flex items-center justify-center">
          <i class="fa-solid fa-volume-high"></i>
        </button>
      `;

      document.getElementById('modalBody').innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="bg-amber-50 p-4 rounded-2xl border border-amber-200 text-center flex flex-col justify-center items-center">
            <span class="text-6xl font-extrabold text-amber-900">${item.char}</span>
            <span class="text-sm text-amber-700 font-bold mt-2">${item.radical}</span>
          </div>
          <div class="md:col-span-2 space-y-2">
            <h4 class="font-bold text-sm text-slate-800">【單字說明與字義】</h4>
            <p class="text-sm text-slate-600 bg-slate-50 p-3 rounded-xl border border-slate-100">${item.charMeaning || '尚無字義說明'}</p>
          </div>
        </div>

        <div class="space-y-3 pt-2">
          <h4 class="font-bold text-sm text-indigo-800">【課文精選圈詞】</h4>
          ${item.terms.map(t => `
            <div class="p-3 bg-indigo-50/50 rounded-xl border border-indigo-100 space-y-1">
              <div class="flex justify-between items-center text-sm font-bold text-slate-800">
                <span>${t.term} <span class="text-indigo-600 font-normal">（${t.zhuyin}）</span></span>
                <button onclick="speakText('${t.term}')" class="text-indigo-600 hover:underline text-xs">朗讀</button>
              </div>
              <p class="text-xs text-slate-600">${t.def || '無詳細解釋'}</p>
            </div>
          `).join('')}
        </div>

        ${item.image ? `
          <div class="pt-2">
            <h4 class="font-bold text-sm text-slate-800 mb-2">【輔助記憶圖片】</h4>
            <img src="${item.image}" alt="記憶圖片" class="w-full max-h-60 object-contain rounded-2xl border border-slate-200">
          </div>
        ` : ''}
      `;

      document.getElementById('detailModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('detailModal').classList.add('hidden');
    }

    // Export / Import JSON Data Backup
    function exportData() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `康軒國語五上_字詞庫備份_${new Date().toISOString().slice(0,10)}.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    function triggerImport() {
      document.getElementById('importFileInput').click();
    }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        try {
          const imported = JSON.parse(evt.target.result);
          if (Array.isArray(imported)) {
            appData = imported;
            saveData();
            renderApp();
            alert("備份資料匯入成功！");
          } else {
            alert("格式不符合！");
          }
        } catch(err) {
          alert("無法讀取 JSON 備份檔案。");
        }
      };
      reader.readAsText(file);
    }
  </script>
